<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechSummit 2026 | Schedule</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  <header>
    <div class="container">
      <h1>TechSummit 2026</h1>
      <p>April 7, 2026 | 10:00 AM - 5:40 PM</p>
      <div class="search-container">
        <input type="text" id="categorySearch" placeholder="Search by category (e.g., frontend, security)...">
      </div>
    </div>
  </header>

  <main class="container">
    <div id="schedule" class="schedule-grid">
      <!-- Talks will be dynamically loaded here -->
      <div class="loading">Loading schedule...</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 TechSummit 1-Day Technical Event</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
